<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #fceeee, #fff6f6);
  font-family: Georgia, serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* Envelope */
.envelope {
  width: 220px;
  height: 140px;
  background: #ffffff;
  position: relative;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.5s;
}

.envelope:hover {
  transform: scale(1.05);
}

.hide {
  opacity: 0;
}

/* Flap */
.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 110px solid transparent;
  border-right: 110px solid transparent;
  border-bottom: 70px solid #ffdada;
  top: -70px;
  transition: 1s;
}

.open .flap {
  transform: rotateX(180deg);
}

/* Letter */
.letter-full {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff;
  display: none;
  overflow-y: auto;
  padding: 40px 20px;
}

.show {
  display: block;
}

.content {
  max-width: 600px;
  margin: auto;
  text-align: center;
}

h1 {
  color: #b85c5c;
}

p {
  font-size: 18px;
  line-height: 1.6;
}

/* Image fix */
img {
  width: 100%;
  max-height: 400px;
  object-fit: cover;
  border-radius: 10px;
  margin: 20px 0;
}

/* iframe fix */
iframe {
  border: none;
}
</style>
</head>

<body>

<div class="envelope" id="env" onclick="openLetter()">
  <div class="flap"></div>
</div>

<div id="letter" class="letter-full">
  <div class="content">

    <h1>For You</h1>

    <p>
      hey you,<br><br>
      i’m really going to miss you.<br>
      all the memories we made mean so much to me.
    </p>

    <img src="photo1.jpg" alt="memory">

    <p>
      no matter where life takes us,<br>
      i’ll always remember you 🤍
    </p>

    <iframe width="100%" height="200"
      src="https://www.youtube.com/embed/YZM9-uNZZgw"
      allowfullscreen>
    </iframe>

  </div>
</div>

<script>
function openLetter() {
  var env = document.getElementById("env");
  env.classList.add("hide");

  setTimeout(function() {
    document.getElementById("letter").classList.add("show");
  }, 500);
}
</script>

</body>
</html>
