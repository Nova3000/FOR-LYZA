<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #ffeaea, #fff);
  font-family: Georgia, serif;
  overflow: hidden;
}

/* 💖 floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
  opacity: 0.6;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0; }
  50% { opacity: 0.7; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* envelope */
.envelope {
  width: 220px;
  height: 140px;
  background: white;
  margin: auto;
  margin-top: 40vh;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
  line-height: 140px;
  font-weight: bold;
}

/* letter */
.letter {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff;
  overflow-y: auto;
  padding: 40px 20px;
  text-align: center;
}

.show {
  display: block;
}

img {
  width: 90%;
  max-width: 500px;
  border-radius: 10px;
  margin: 20px 0;
}

iframe {
  border: none;
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
  open me 💌
</div>

<div id="letter" class="letter">
  <h1 style="color:#b85c5c;">For You</h1>

  <p>
    hey you,<br><br>
    i’m really going to miss you.<br>
    all the memories we made mean so much to me.
  </p>

  <img src="./photo1.jpg" alt="memory">

  <p>
    no matter where life takes us,<br>
    i’ll always remember you 🤍
  </p>

  <iframe width="90%" height="220"
  src="https://www.youtube.com/embed/YZM9-uNZZgw?rel=0"
  allowfullscreen>
  </iframe>
</div>

<script>
function openLetter() {
  document.querySelector(".envelope").style.display = "none";
  document.getElementById("letter").classList.add("show");

  // create hearts
  for (let i = 0; i < 20; i++) {
    let heart = document.createElement("div");
    heart.innerHTML = "♥";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
