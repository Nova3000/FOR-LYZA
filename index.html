<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You</title>

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #ffeaea, #fff);
  font-family: Georgia, serif;
  overflow: hidden;
}

/* 💖 floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 18px;
  animation: floatUp 6s linear infinite;
  opacity: 0.5;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 0; }
  50% { opacity: 0.7; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* envelope */
.envelope {
  width: 220px;
  height: 140px;
  background: white;
  margin: auto;
  margin-top: 40vh;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
  line-height: 140px;
  font-weight: bold;
  border-radius: 10px;
}

/* letter */
.letter {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #fff;
  overflow-y: auto;
  padding: 40px 20px;
  text-align: center;
}

.show {
  display: block;
}

h1 {
  color: #b85c5c;
}

p {
  font-size: 18px;
  line-height: 1.7;
}

/* 🖼️ image FIX */
img {
  width: 90%;
  max-width: 450px;
  border-radius: 12px;
  margin: 20px 0;
  object-fit: cover;
}

/* 🎵 smaller music */
.music {
  max-width: 300px;
  margin: 30px auto;
}

iframe {
  width: 100%;
  height: 170px;
  border: none;
}
</style>
</head>

<body>

<div class="envelope" onclick="openLetter()">
  open me 💌
</div>

<div id="letter" class="letter">

  <h1>For You</h1>

  <p>
    hey you,<br><br>
    i’m really going to miss you.<br>
    all the memories we made mean so much to me.
  </p>

  <!-- ⚠️ MAKE SURE THIS NAME MATCHES YOUR FILE -->
  <img src="photo.jpg" alt="memory">

  <p>
    no matter where life takes us,<br>
    i’ll always remember you 🤍
  </p>

  <div class="music">
    <iframe 
      src="https://www.youtube.com/embed/YZM9-uNZZgw?rel=0"
      allowfullscreen>
    </iframe>
  </div>

</div>

<script>
function openLetter() {
  document.querySelector(".envelope").style.display = "none";
  document.getElementById("letter").classList.add("show");

  // 💖 create floating hearts
  for (let i = 0; i < 25; i++) {
    let heart = document.createElement("div");
    heart.innerHTML = "♥";
    heart.className = "heart";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (4 + Math.random() * 3) + "s";
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
